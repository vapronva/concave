---
stages:
  - test
  - build
  - post-test
  - publish

variables:
  CONVEX_REF: 96e9f1a689e678fbf7dc90604e1bfc474a217dff

include:
  - component: $CI_SERVER_FQDN/ci/security/bundle@1
  - component: $CI_SERVER_FQDN/ci/golang/init-vet@2
    inputs:
      working_dirs: [router/usher, router/bigbrain]
  - component: $CI_SERVER_FQDN/ci/golang/lint@2
    inputs:
      working_dirs: [router/usher, router/bigbrain]
  - component: $CI_SERVER_FQDN/ci/golang/test@2
    inputs:
      working_dirs: [router/usher, router/bigbrain]
  - component: $CI_SERVER_FQDN/ci/docker/lint@4
    inputs:
      job_name: hadolint (backend)
      dockerfile_path: backend/Dockerfile.backend
      ignore_rules: DL3008,DL3015
  - component: $CI_SERVER_FQDN/ci/docker/lint@4
    inputs:
      job_name: hadolint (dashboard)
      dockerfile_path: backend/Dockerfile.dashboard
      ignore_rules: DL3008,DL3015,DL3059
  - component: $CI_SERVER_FQDN/ci/docker/lint@4
    inputs:
      job_name: hadolint (usher)
      dockerfile_path: router/usher/Dockerfile
      ignore_rules: DL3018
  - component: $CI_SERVER_FQDN/ci/docker/lint@4
    inputs:
      job_name: hadolint (bigbrain)
      dockerfile_path: router/bigbrain/Dockerfile
      ignore_rules: DL3018
  - component: $CI_SERVER_FQDN/ci/docker/build-and-scan@4
    inputs:
      name: backend
      image: backend
      tags: latest,$CI_COMMIT_SHA
      scan_tag: $CI_COMMIT_SHA
      dockerfile: backend/Dockerfile.backend
      working_dir: backend
      build_args: --build-arg CONVEX_REF=$CONVEX_REF
      architectures: linux/amd64
      rules_changes:
        - backend/**/*
        - .gitlab-ci.yml
  - component: $CI_SERVER_FQDN/ci/docker/build-and-scan@4
    inputs:
      name: dashboard
      image: dashboard
      tags: latest,$CI_COMMIT_SHA
      scan_tag: $CI_COMMIT_SHA
      dockerfile: backend/Dockerfile.dashboard
      working_dir: backend
      build_args: --build-arg CONVEX_REF=$CONVEX_REF
      architectures: linux/amd64
      rules_changes:
        - backend/**/*
        - .gitlab-ci.yml
  - component: $CI_SERVER_FQDN/ci/docker/build-and-scan@4
    inputs:
      name: usher
      image: usher
      tags: latest,$CI_COMMIT_SHA
      scan_tag: $CI_COMMIT_SHA
      dockerfile: router/usher/Dockerfile
      working_dir: router/usher
      architectures: linux/amd64
      rules_changes:
        - router/usher/**/*
        - .gitlab-ci.yml
  - component: $CI_SERVER_FQDN/ci/docker/build-and-scan@4
    inputs:
      name: bigbrain
      image: bigbrain
      tags: latest,$CI_COMMIT_SHA
      scan_tag: $CI_COMMIT_SHA
      dockerfile: router/bigbrain/Dockerfile
      working_dir: router/bigbrain
      architectures: linux/amd64
      rules_changes:
        - router/bigbrain/**/*
        - .gitlab-ci.yml
  - component: $CI_SERVER_FQDN/ci/helm-chart/lint@1
    inputs:
      job_name: validate + lint (helm charts)
      chart_dirs: charts
      ct_args: --validate-chart-schema --validate-yaml --debug --validate-maintainers=false
  - component: $CI_SERVER_FQDN/ci/helm-chart/publish@1
    inputs:
      job_name: publish helm charts to gitlab registry
      charts_glob: charts/*
      lint_job_name: validate + lint (helm charts)
