{{- if .Values.usher.enabled }}
{{- $u := .Values.usher -}}
{{- $deployments := required "deployments is required when usher.enabled" .Values.deployments -}}
{{- if eq (len $deployments) 0 -}}
{{- fail "deployments must contain at least one entry when usher.enabled" -}}
{{- end -}}
---
apiVersion: v1
kind: ConfigMap

metadata:
  name: {{ include "convex.usherName" . }}-config
  namespace: {{ .Values.namespace.system }}
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "usher") | nindent 4 }}

data:
  config.json: |
    {{ toJson (dict "deployments" $deployments) | nindent 4 }}

---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "convex.usherName" . }}
  namespace: {{ .Values.namespace.system }}
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "usher") | nindent 4 }}

spec:
  replicas: {{ $u.replicas }}
  selector:
    matchLabels:
      {{- include "convex.componentSelectorLabels" (dict "ctx" . "component" "usher") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "convex.componentLabels" (dict "ctx" . "component" "usher") | nindent 8 }}
      annotations:
        checksum/config: {{ toJson (dict "deployments" $deployments) | sha256sum }}
    spec:
      {{- with include "convex.imagePullSecrets" . }}{{- . | nindent 6 }}{{- end }}
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            {{- with $u.preferredNode }}
            - weight: 1
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - {{ . }}
            {{- end }}
          {{- if $u.nodes }}
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      {{- range $u.nodes }}
                      - {{ . }}
                      {{- end }}
          {{- end }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "convex.componentSelectorLabels" (dict "ctx" . "component" "usher") | nindent 20 }}
      containers:
        - name: usher
          image: {{ include "convex-platform.image" (dict "ctx" . "spec" $u.image) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config=/etc/usher/config.json
            - --addr={{ $u.listen }}
          {{- $bbUrl := $u.bigbrainUrl }}
          {{- if and (not $bbUrl) .Values.bigbrain.enabled }}
          {{- $bbUrl = printf "http://%s.%s.svc.cluster.local:%s" (include "convex.bigbrainName" .) .Values.namespace.system (include "convex.listenPort" .Values.bigbrain.listen) }}
          {{- end }}
          {{- if or $bbUrl $u.extraEnv }}
          env:
            {{- if $bbUrl }}
            - name: USHER_BIGBRAIN_URL
              value: {{ $bbUrl | quote }}
            {{- end }}
            {{- with $u.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          ports:
            - { name: http, containerPort: {{ include "convex.listenPort" $u.listen }} }
          volumeMounts:
            - { name: config, mountPath: /etc/usher }
          readinessProbe:
            httpGet: { path: /usher/healthz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /usher/healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 6
          {{- with $u.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: {{ include "convex.usherName" . }}-config

---
apiVersion: v1
kind: Service

metadata:
  name: usher
  namespace: {{ .Values.namespace.system }}
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "usher") | nindent 4 }}

spec:
  selector:
    {{- include "convex.componentSelectorLabels" (dict "ctx" . "component" "usher") | nindent 4 }}
  ports:
    - { name: http, port: 8080, targetPort: http }

{{- if and $u.pdb.enabled (gt (int $u.replicas) 1) }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget

metadata:
  name: {{ include "convex.usherName" . }}
  namespace: {{ .Values.namespace.system }}
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "usher") | nindent 4 }}

spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "convex.componentSelectorLabels" (dict "ctx" . "component" "usher") | nindent 6 }}
{{- end }}
{{- end }}
