{{- if .Values.bigbrain.enabled }}
{{- $b := .Values.bigbrain -}}
{{- $deployments := required "deployments is required when bigbrain.enabled" .Values.deployments -}}
{{- if eq (len $deployments) 0 -}}
{{- fail "deployments must contain at least one entry when bigbrain.enabled" -}}
{{- end -}}
{{- if ne (int $b.replicas) 1 -}}
{{- fail "bigbrain.replicas must equal 1 because controller leader election is not implemented" -}}
{{- end -}}
{{- if $b.rbac.create }}
---
apiVersion: v1
kind: ServiceAccount

metadata:
  name: {{ include "convex.bigbrainName" . }}
  namespace: {{ .Values.namespace.system }}
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "bigbrain") | nindent 4 }}

{{- $namespaces := dict -}}
{{- range $deployments -}}
{{- $_ := set $namespaces (required "deployments[].namespace is required" .namespace) true -}}
{{- end -}}
{{- range $namespace, $_ := $namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role

metadata:
  name: {{ include "convex.bigbrainName" $ }}
  namespace: {{ $namespace }}
  labels:
    {{- include "convex.componentLabels" (dict "ctx" $ "component" "bigbrain") | nindent 4 }}

rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding

metadata:
  name: {{ include "convex.bigbrainName" $ }}
  namespace: {{ $namespace }}
  labels:
    {{- include "convex.componentLabels" (dict "ctx" $ "component" "bigbrain") | nindent 4 }}

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "convex.bigbrainName" $ }}

subjects:
  - kind: ServiceAccount
    name: {{ include "convex.bigbrainName" $ }}
    namespace: {{ $.Values.namespace.system }}
{{- end }}

{{- end }}
---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "convex.bigbrainName" . }}
  namespace: {{ .Values.namespace.system }}
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "bigbrain") | nindent 4 }}

spec:
  replicas: {{ $b.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "convex.componentSelectorLabels" (dict "ctx" . "component" "bigbrain") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "convex.componentLabels" (dict "ctx" . "component" "bigbrain") | nindent 8 }}
    spec:
      {{- with include "convex.imagePullSecrets" . }}{{- . | nindent 6 }}{{- end }}
      terminationGracePeriodSeconds: 40
      {{- if $b.rbac.create }}
      serviceAccountName: {{ include "convex.bigbrainName" . }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            {{- with $b.preferredNode }}
            - weight: 1
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - {{ . }}
            {{- end }}
          {{- if $b.nodes }}
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      {{- range $b.nodes }}
                      - {{ . }}
                      {{- end }}
          {{- end }}
      containers:
        - name: bigbrain
          image: {{ include "convex-platform.image" (dict "ctx" . "spec" $b.image) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--addr={{ $b.listen }}"]
          env:
            - name: BIGBRAIN_LABEL_PREFIX
              value: {{ include "convex.labelPrefix" . | quote }}
            - name: BIGBRAIN_DEPLOYMENTS
              value: {{ include "convex.bigbrainDeployments" . | quote }}
            - name: BIGBRAIN_INTERVAL
              value: {{ $b.reconcileInterval | quote }}
            - name: BIGBRAIN_PROMOTE_DEBOUNCE
              value: {{ $b.promoteDebounce | quote }}
            - name: BIGBRAIN_FAILBACK_ENABLED
              value: {{ $b.failback.enabled | quote }}
            - name: BIGBRAIN_FAILBACK_STABILITY
              value: {{ $b.failback.stability | quote }}
            - name: BIGBRAIN_FAILBACK_WARMTH_LAG
              value: {{ int64 $b.failback.warmthLag | quote }}
            {{- range $i, $deployment := $deployments }}
            {{- $cp := $deployment.controlPlaneTokenSecretRef | default dict }}
            - name: BIGBRAIN_CONTROL_PLANE_TOKEN_{{ $i }}
              valueFrom:
                secretKeyRef:
                  name: {{ required "deployments[].controlPlaneTokenSecretRef.name is required" $cp.name }}
                  key: {{ default "control-plane-token" $cp.key }}
            {{- with $deployment.usageTokenSecretRef }}
            {{- if .name }}
            - name: BIGBRAIN_USAGE_TOKEN_{{ $i }}
              valueFrom:
                secretKeyRef:
                  name: {{ .name }}
                  key: {{ default "usage-token" .key }}
            {{- end }}
            {{- end }}
            {{- end }}
            - name: INSIGHTS_RING_CAP
              value: {{ $b.insightsRingCap | quote }}
            {{- if $b.metricsApiserver.enabled }}
            - name: BIGBRAIN_METRICS_APISERVER_ENABLED
              value: "true"
            - name: BIGBRAIN_METRICS_APISERVER_PORT
              value: {{ $b.metricsApiserver.port | quote }}
            {{- end }}
            {{- with $b.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - { name: http, containerPort: {{ include "convex.listenPort" $b.listen }} }
            {{- if $b.metricsApiserver.enabled }}
            - { name: metrics-api, containerPort: {{ $b.metricsApiserver.port }} }
            {{- end }}
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          {{- with $b.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if $b.metricsApiserver.enabled }}
          volumeMounts:
            - { name: apiserver-certs, mountPath: /var/run/bigbrain-apiserver }
          {{- end }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      {{- if $b.metricsApiserver.enabled }}
      volumes:
        - { name: apiserver-certs, emptyDir: {} }
      {{- end }}

---
apiVersion: v1
kind: Service

metadata:
  name: {{ include "convex.bigbrainName" . }}
  namespace: {{ .Values.namespace.system }}
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "bigbrain") | nindent 4 }}

spec:
  selector:
    {{- include "convex.componentSelectorLabels" (dict "ctx" . "component" "bigbrain") | nindent 4 }}
  ports:
    - { name: http, port: {{ include "convex.listenPort" $b.listen }}, targetPort: http }
    {{- if $b.metricsApiserver.enabled }}
    - { name: https, port: {{ $b.metricsApiserver.port }}, targetPort: metrics-api }
    {{- end }}

{{- if $b.metricsApiserver.enabled }}
---
apiVersion: apiregistration.k8s.io/v1
kind: APIService

metadata:
  name: v1beta1.custom.metrics.k8s.io
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "bigbrain") | nindent 4 }}

spec:
  service:
    name: {{ include "convex.bigbrainName" . }}
    namespace: {{ .Values.namespace.system }}
    port: {{ $b.metricsApiserver.port }}
  group: custom.metrics.k8s.io
  version: v1beta1
  insecureSkipTLSVerify: true
  groupPriorityMinimum: 100
  versionPriority: 100

---
apiVersion: apiregistration.k8s.io/v1
kind: APIService

metadata:
  name: v1beta2.custom.metrics.k8s.io
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "bigbrain") | nindent 4 }}

spec:
  service:
    name: {{ include "convex.bigbrainName" . }}
    namespace: {{ .Values.namespace.system }}
    port: {{ $b.metricsApiserver.port }}
  group: custom.metrics.k8s.io
  version: v1beta2
  insecureSkipTLSVerify: true
  groupPriorityMinimum: 100
  versionPriority: 100

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding

metadata:
  name: {{ include "convex.bigbrainName" . }}:system:auth-delegator
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "bigbrain") | nindent 4 }}

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator

subjects:
  - kind: ServiceAccount
    name: {{ include "convex.bigbrainName" . }}
    namespace: {{ .Values.namespace.system }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding

metadata:
  name: {{ include "convex.bigbrainName" . }}-auth-reader
  namespace: kube-system
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "bigbrain") | nindent 4 }}

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader

subjects:
  - kind: ServiceAccount
    name: {{ include "convex.bigbrainName" . }}
    namespace: {{ .Values.namespace.system }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole

metadata:
  name: {{ include "convex.bigbrainName" . }}-custom-metrics-reader
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "bigbrain") | nindent 4 }}

rules:
  - apiGroups: ["custom.metrics.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding

metadata:
  name: {{ include "convex.bigbrainName" . }}-hpa-custom-metrics
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "bigbrain") | nindent 4 }}

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "convex.bigbrainName" . }}-custom-metrics-reader

subjects:
  - kind: ServiceAccount
    name: horizontal-pod-autoscaler
    namespace: kube-system
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: system:kube-controller-manager
{{- end }}
{{- end }}
