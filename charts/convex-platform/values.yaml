---
labelPrefix: convex

namespace:
  system: convex-system

image:
  registry: docker.horse
  pullPolicy: IfNotPresent

usher:
  enabled: true
  replicas: 2
  listen: ":8080"
  image:
    repository: vapronva/concave/usher
    tag: ""
  bigbrainUrl: ""
  preferredNode: bho-core-v2
  nodes: []
  config:
    deployments: []
  resources: {}

bigbrain:
  enabled: true
  replicas: 1
  listen: :8081
  image:
    repository: vapronva/concave/bigbrain
    tag: ""
  deployments: ""
  usageToken: ""
  insightsRingCap: 50000
  dashboardHost: ""
  reconcileInterval: 2s
  promoteDebounce: 3
  failback:
    enabled: true
    stability: 15s
    warmthLag: 5000000000
  preferredNode: bho-core-v2
  nodes: []
  rbac:
    create: true
  resources: {}
