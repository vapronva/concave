{{- if gt (int .Values.ha.standbyReplicas) 0 }}
---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "convex.followerName" . }}
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "follower") | nindent 4 }}

spec:
  replicas: {{ .Values.ha.standbyReplicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      {{- include "convex.componentSelectorLabels" (dict "ctx" . "component" "follower") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "convex.componentLabels" (dict "ctx" . "component" "follower") | nindent 8 }}
        {{- include "convex.backendDiscoveryLabels" (dict "ctx" . "role" "follower" "priority" .Values.ha.followerPriority) | nindent 8 }}
    spec:
      {{- with include "convex.imagePullSecrets" . }}{{- . | nindent 6 }}{{- end }}
      {{- with include "convex.podScheduling" .Values.ha.follower }}{{- . | nindent 6 }}{{- end }}
      {{- if .Values.ha.follower.affinity }}
      affinity:
        {{- toYaml .Values.ha.follower.affinity | nindent 8 }}
      {{- else }}
      affinity:
        podAntiAffinity:
          {{- $prefix := include "convex.labelPrefix" . }}
          {{- $spreadKey := .Values.ha.spreadTopologyKey | default "kubernetes.io/hostname" }}
          {{- if .Values.ha.requireNodeSpread }}
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: {{ $spreadKey }}
              labelSelector:
                matchLabels:
                  {{ $prefix }}/component: backend
                  {{ $prefix }}/instance: {{ required "instance.name is required" .Values.instance.name | quote }}
          {{- else }}
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: {{ $spreadKey }}
                labelSelector:
                  matchLabels:
                    {{ $prefix }}/component: backend
                    {{ $prefix }}/instance: {{ required "instance.name is required" .Values.instance.name | quote }}
          {{- end }}
      {{- end }}
      terminationGracePeriodSeconds: 20
      automountServiceAccountToken: false
      containers:
        {{- include "convex.backendContainer" (dict "ctx" . "role" "follower" "extraPorts" (list) "probeInitialDelaySeconds" 8 "resourcesKey" "follower") | nindent 8 }}
      volumes:
        {{- include "convex.dataVolume" . | nindent 8 }}
{{- end }}
