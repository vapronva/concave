{{- if .Values.dashboard.enabled }}
---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "convex.dashboardName" . }}
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "dashboard") | nindent 4 }}

spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "convex.componentSelectorLabels" (dict "ctx" . "component" "dashboard") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "convex.componentLabels" (dict "ctx" . "component" "dashboard") | nindent 8 }}
        {{- include "convex.componentDiscoveryLabel" (dict "ctx" . "component" "dashboard") | nindent 8 }}
    spec:
      {{- with include "convex.imagePullSecrets" . }}{{- . | nindent 6 }}{{- end }}
      {{- if .Values.dashboard.nodes }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      {{- range .Values.dashboard.nodes }}
                      - {{ . }}
                      {{- end }}
      {{- end }}
      automountServiceAccountToken: false
      containers:
        - name: dashboard
          image: {{ include "convex.image" (dict "ctx" . "spec" .Values.image.dashboard) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { name: http, containerPort: {{ .Values.dashboard.port }} }
          env:
            - name: PORT
              value: {{ .Values.dashboard.port | quote }}
            - name: HOSTNAME
              value: 0.0.0.0
            - name: NEXT_PUBLIC_DEPLOYMENT_URL
              value: "https://{{ required "hosts.api is required" .Values.hosts.api }}"
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 30
            periodSeconds: 20
          {{- with .Values.resources.dashboard }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- include "convex.containerSecurityContext" . | nindent 12 }}

---
apiVersion: v1
kind: Service

metadata:
  name: {{ include "convex.dashboardName" . }}
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "dashboard") | nindent 4 }}

spec:
  selector:
    {{- include "convex.componentSelectorLabels" (dict "ctx" . "component" "dashboard") | nindent 4 }}
  ports:
    - { name: http, port: {{ .Values.dashboard.port }}, targetPort: http }
{{- end }}
