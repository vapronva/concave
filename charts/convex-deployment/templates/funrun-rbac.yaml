{{- if and .Values.funrun.enabled .Values.funrun.podDeletionCost.enabled }}
---
apiVersion: v1
kind: ServiceAccount

metadata:
  name: {{ include "convex.funrunName" . }}
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "funrun") | nindent 4 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role

metadata:
  name: {{ include "convex.funrunName" . }}-pod-deletion-cost
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "funrun") | nindent 4 }}

rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding

metadata:
  name: {{ include "convex.funrunName" . }}-pod-deletion-cost
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "funrun") | nindent 4 }}

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "convex.funrunName" . }}-pod-deletion-cost

subjects:
  - kind: ServiceAccount
    name: {{ include "convex.funrunName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
