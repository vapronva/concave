{{- if .Values.funrun.enabled }}
{{- $funrunDrainDelay := int (.Values.funrun.drainDelaySeconds | default 8) }}
{{- $funrunShutdownNeed := add 15 $funrunDrainDelay 600 }}
{{- if gt $funrunShutdownNeed (int .Values.funrun.terminationGracePeriodSeconds) }}
{{- fail (printf "funrun.terminationGracePeriodSeconds=%d is below the %d seconds a clean shutdown needs: 15 (preStop sleep) + %d (drain delay) + 600 (default action budget, ACTIONS_USER_TIMEOUT_SECS); raise funrun.terminationGracePeriodSeconds" (int .Values.funrun.terminationGracePeriodSeconds) $funrunShutdownNeed $funrunDrainDelay) }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "convex.funrunName" . }}
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "funrun") | nindent 4 }}

spec:
  {{- if not .Values.funrun.hpa.enabled }}
  replicas: {{ .Values.funrun.replicas }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "convex.componentSelectorLabels" (dict "ctx" . "component" "funrun") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "convex.componentLabels" (dict "ctx" . "component" "funrun") | nindent 8 }}
        {{- include "convex.componentDiscoveryLabel" (dict "ctx" . "component" "funrun") | nindent 8 }}
    spec:
      {{- with include "convex.imagePullSecrets" . }}{{- . | nindent 6 }}{{- end }}
      {{- if .Values.funrun.podDeletionCost.enabled }}
      serviceAccountName: {{ include "convex.funrunName" . }}
      {{- end }}
      {{- with include "convex.podScheduling" .Values.funrun }}{{- . | nindent 6 }}{{- end }}
      {{- if .Values.funrun.affinity }}
      affinity:
        {{- toYaml .Values.funrun.affinity | nindent 8 }}
      {{- else }}
      affinity:
        {{- if or .Values.ha.preferredNode .Values.funrun.nodes }}
        nodeAffinity:
          {{- with .Values.ha.preferredNode }}
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - {{ . }}
          {{- end }}
          {{- if .Values.funrun.nodes }}
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      {{- range .Values.funrun.nodes }}
                      - {{ . }}
                      {{- end }}
          {{- end }}
        {{- end }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "convex.componentSelectorLabels" (dict "ctx" . "component" "funrun") | nindent 20 }}
      {{- end }}
      containers:
        - name: funrun
          image: {{ include "convex.image" (dict "ctx" . "spec" .Values.image) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/convex/convex-funrun"]
          ports:
            - { name: grpc, containerPort: {{ include "convex.listenPort" .Values.funrun.listen }} }
            - { name: health, containerPort: {{ include "convex.listenPort" .Values.funrun.healthListen }} }
          envFrom:
            - configMapRef:
                name: {{ include "convex.envConfigName" . }}
          env:
            - name: FUNRUN_LISTEN
              value: "0.0.0.0:{{ include "convex.listenPort" .Values.funrun.listen }}"
            - name: FUNRUN_HEALTH_LISTEN
              value: "0.0.0.0:{{ include "convex.listenPort" .Values.funrun.healthListen }}"
            - name: FUNRUN_MAX_SNAPSHOT_LAG_SECS
              value: {{ int64 .Values.funrun.maxSnapshotLagSeconds | quote }}
            {{- with .Values.funrun.drainDelaySeconds }}
            - name: CONVEX_FUNRUN_DRAIN_DELAY_SECS
              value: {{ int64 . | quote }}
            {{- end }}
            - name: FUNRUN_INSTANCE_NAME
              value: {{ required "instance.name is required" .Values.instance.name | quote }}
            - name: FUNRUN_INSTANCE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "convex.instanceSecretName" . }}
                  key: {{ .Values.instance.secretRef.key }}
            {{- include "convex.pgEnv" . | nindent 12 }}
            - name: FUNRUN_DB
              value: postgres-v5
            {{- if eq .Values.db.sslMode "disable" }}
            - name: FUNRUN_DO_NOT_REQUIRE_SSL
              value: "true"
            {{- end }}
            {{- if .Values.funrun.podDeletionCost.enabled }}
            - name: CONVEX_FUNRUN_POD_DELETION_COST
              value: "true"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- end }}
            {{- with .Values.funrun.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            {{- include "convex.dataVolumeMount" . | nindent 12 }}
          startupProbe:
            httpGet: { path: /readyz, port: health }
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 20
          readinessProbe:
            httpGet: { path: /readyz, port: health }
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /healthz, port: health }
            initialDelaySeconds: 120
            failureThreshold: 6
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 15"]
          {{- with .Values.resources.funrun }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- include "convex.containerSecurityContext" . | nindent 12 }}
      terminationGracePeriodSeconds: {{ .Values.funrun.terminationGracePeriodSeconds }}
      volumes:
        {{- include "convex.dataVolume" . | nindent 8 }}

---
apiVersion: v1
kind: Service

metadata:
  name: {{ include "convex.funrunName" . }}
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "funrun") | nindent 4 }}

spec:
  clusterIP: None
  selector:
    {{- include "convex.componentSelectorLabels" (dict "ctx" . "component" "funrun") | nindent 4 }}
  ports:
    - { name: grpc, port: {{ include "convex.listenPort" .Values.funrun.listen }}, targetPort: grpc }

{{- if .Values.funrun.hpa.enabled }}
{{- $funrunResources := .Values.resources | default dict }}
{{- if and (not .Values.funrun.hpa.isolateUtilization.enabled) (not .Values.funrun.hpa.cpuAverageUtilization) (not .Values.funrun.hpa.memoryAverageUtilization) }}
{{- fail "funrun.hpa.enabled needs at least one metric source: enable funrun.hpa.isolateUtilization or set funrun.hpa.cpuAverageUtilization or funrun.hpa.memoryAverageUtilization; an autoscaling/v2 HPA with no metrics defaults to 80% CPU utilization and wedges without CPU requests" }}
{{- end }}
{{- if and .Values.funrun.hpa.cpuAverageUtilization (not (dig "funrun" "requests" "cpu" "" $funrunResources)) (not (dig "funrun" "limits" "cpu" "" $funrunResources)) }}
{{- fail "funrun.hpa.cpuAverageUtilization is set but resources.funrun sets neither requests.cpu nor limits.cpu: an HPA CPU Utilization metric without a CPU request can never be computed and permanently blocks scale-down; set resources.funrun.requests.cpu (or limits.cpu, which defaults the request) or unset funrun.hpa.cpuAverageUtilization" }}
{{- end }}
{{- if and .Values.funrun.hpa.memoryAverageUtilization (not (dig "funrun" "requests" "memory" "" $funrunResources)) (not (dig "funrun" "limits" "memory" "" $funrunResources)) }}
{{- fail "funrun.hpa.memoryAverageUtilization is set but resources.funrun sets neither requests.memory nor limits.memory: an HPA memory Utilization metric without a memory request can never be computed and permanently blocks scale-down; set resources.funrun.requests.memory (or limits.memory, which defaults the request) or unset funrun.hpa.memoryAverageUtilization" }}
{{- end }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: {{ include "convex.funrunName" . }}
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "funrun") | nindent 4 }}

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "convex.funrunName" . }}
  minReplicas: {{ .Values.funrun.hpa.minReplicas }}
  maxReplicas: {{ .Values.funrun.hpa.maxReplicas }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - { type: Pods, value: 2, periodSeconds: 30 }
        - { type: Percent, value: 100, periodSeconds: 30 }
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.funrun.hpa.scaleDownStabilizationSeconds }}
      policies:
        - { type: Percent, value: 25, periodSeconds: 60 }
  metrics:
    {{- if .Values.funrun.hpa.isolateUtilization.enabled }}
    - type: Pods
      pods:
        metric:
          name: funrun_isolate_utilization
        target:
          type: AverageValue
          averageValue: {{ int64 .Values.funrun.hpa.isolateUtilization.targetPercent | quote }}
    {{- end }}
    {{- with .Values.funrun.hpa.cpuAverageUtilization }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ . }}
    {{- end }}
    {{- with .Values.funrun.hpa.memoryAverageUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ . }}
    {{- end }}
{{- end }}
{{- end }}
