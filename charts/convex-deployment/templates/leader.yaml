---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "convex.leaderName" . }}
  labels:
    {{- include "convex.componentLabels" (dict "ctx" . "component" "leader") | nindent 4 }}

spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "convex.componentSelectorLabels" (dict "ctx" . "component" "leader") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "convex.componentLabels" (dict "ctx" . "component" "leader") | nindent 8 }}
        {{- include "convex.backendDiscoveryLabels" (dict "ctx" . "role" "leader" "priority" .Values.ha.leaderPriority) | nindent 8 }}
    spec:
      {{- with include "convex.imagePullSecrets" . }}{{- . | nindent 6 }}{{- end }}
      {{- with include "convex.podScheduling" .Values.ha.leader }}{{- . | nindent 6 }}{{- end }}
      {{- with .Values.ha.leader.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 40
      automountServiceAccountToken: false
      containers:
        {{- include "convex.backendContainer" (dict "ctx" . "role" "leader" "extraPorts" (list (dict "name" "site" "containerPort" 3211)) "probeInitialDelaySeconds" 10 "resourcesKey" "leader") | nindent 8 }}
      volumes:
        {{- include "convex.dataVolume" . | nindent 8 }}
