---
labelPrefix: convex

nameOverride: ""
fullnameOverride: ""

instance:
  name: ""
  secretRef:
    name: ""
    key: instance-secret

image:
  registry: docker.horse
  repository: vapronva/concave/backend
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []
  dashboard:
    repository: vapronva/concave/dashboard
    tag: ""

db:
  host: ""
  port: 5432
  user: postgres
  sslMode: disable
  passwordRef:
    name: ""
    key: db-password

storage:
  nfs:
    server: ""
    path: ""
    mountPath: /convex/data

hosts:
  api: ""
  site: ""
  dashboard: ""

ha:
  standbyReplicas: 1
  preferredNode: ""
  leaderPriority: 100
  followerPriority: 0
  requireNodeSpread: true
  spreadTopologyKey: kubernetes.io/hostname
  demotionDrainTimeoutSeconds: ""
  pdb:
    enabled: true
  leader:
    nodeSelector: {}
    tolerations: []
    affinity: {}
  follower:
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []

insights:
  enabled: false
  sinkUrl: ""
  queryUrl: ""
  tokenRef:
    name: ""
    key: usage-token

controlPlane:
  tokenSecretRef:
    name: ""
    key: control-plane-token

backend:
  extraEnv: []
  concurrency:
    queries: ""
    mutations: ""
    v8Actions: ""
  actionUserTimeoutSeconds: 600
  httpTimeoutSeconds: ""
  maxConcurrentRequests: ""
  committerQueueSize: ""

funrun:
  enabled: true
  replicas: 2
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  listen: :8090
  healthListen: :8091
  maxSnapshotLagSeconds: 30
  drainDelaySeconds: ""
  terminationGracePeriodSeconds: 930
  nodes: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  extraEnv: []
  isolate:
    maxWorkers: ""
    preloadWorkers: ""
    heapUserMiB: ""
    heapExtraMiB: ""
    arrayBufferMiB: ""
    queueSize: ""
    activeThreads: ""
    initialPermitTimeoutMs: ""
  cache:
    indexBytes: ""
    followerIndexBytes: ""
    codeBytes: ""
    moduleBytes: ""
  podDeletionCost:
    enabled: true
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    isolateUtilization:
      enabled: true
      targetPercent: 70
    cpuAverageUtilization: ""
    memoryAverageUtilization: ""
    scaleDownStabilizationSeconds: 300

sizeLimits:
  writeBytes: ""
  readBytes: ""

allocator:
  arenaMax: 2

dashboard:
  enabled: true
  port: 6791
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  nodes: []
  nodeSelector: {}
  tolerations: []
  affinity: {}

ingress:
  ckic:
    enabled: true
  usherService:
    name: usher
    namespace: convex-system
    port: 8080

resources:
  leader: {}
  follower: {}
  funrun: {}
  dashboard: {}
