---
labelPrefix: convex

instance:
  name: ""
  secretRef:
    name: ""
    key: instance-secret

image:
  registry: docker.horse
  repository: vapronva/concave/backend
  tag: ""
  pullPolicy: IfNotPresent
  dashboard:
    repository: vapronva/concave/dashboard
    tag: ""

db:
  host: ""
  port: 5432
  user: postgres
  sslMode: disable
  passwordRef:
    name: ""
    key: db-password

storage:
  mode: nfs
  nfs:
    server: ""
    path: ""
    mountPath: /convex/data

hosts:
  api: ""
  site: ""
  dashboard: ""

ha:
  standbyReplicas: 1
  preferredNode: ""
  leaderPriority: 100
  followerPriority: 0
  requireNodeSpread: false
  demotionDrainTimeoutSeconds: ""
  pdb:
    enabled: false
  leader:
    nodeSelector: {}
  follower:
    nodeSelector: {}

insights:
  enabled: false
  sinkUrl: ""
  queryUrl: ""
  tokenRef:
    name: ""
    key: usage-token

controlPlane:
  tokenSecretRef:
    name: ""
    key: control-plane-token

backend:
  extraEnv: []

funrun:
  enabled: true
  replicas: 2
  listen: :8090
  healthListen: :8091
  maxSnapshotLagSeconds: 30
  drainDelaySeconds: ""
  terminationGracePeriodSeconds: 45
  nodes: []
  extraEnv: []
  podDeletionCost:
    enabled: true
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    isolateUtilization:
      enabled: true
      targetPercent: 70
    cpuAverageUtilization: 70
    memoryAverageUtilization: ""
    scaleDownStabilizationSeconds: 300

dashboard:
  enabled: true
  port: 6791
  nodes: []
  adminKeyRef:
    name: ""
    key: admin-key

ingress:
  usherService:
    name: usher
    namespace: convex-system
    port: 8080

resources:
  leader: {}
  follower: {}
  funrun: {}
  dashboard: {}
